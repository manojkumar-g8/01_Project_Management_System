name: pms_ci_cd

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pms_ci_cd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Lint server
        working-directory: server
        run: npm run lint -- --max-warnings=0

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Lint client
        working-directory: client
        run: npm run lint -- --max-warnings=0

      - name: Build server Docker image
        run: docker build -t 01_pms_server_docker_image ./server

      - name: Build client Docker image
        run: docker build -t 01_pms_client_docker_image ./client
